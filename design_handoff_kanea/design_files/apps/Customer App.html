<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanea — Customer App</title>
<link rel="stylesheet" href="../styles/kanea.css">
<style>
  body { background: var(--bg-2); }
  .topbar { border-bottom: 1px solid var(--line); background: color-mix(in oklch, var(--bg) 85%, transparent); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 30; }
  .topbar-in { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; padding: 0 24px; }
  .back { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: var(--ink-2); font-weight: 600; font-size: 14px; padding: 8px 12px; border-radius: 10px; }
  .back:hover { background: var(--bg-2); color: var(--ink); }
  .topbar .title { font-family: var(--display); font-weight: 600; font-size: 16px; }
  .topbar .title b { color: var(--sun-deep); }

  .stage { display: flex; gap: 44px; align-items: flex-start; justify-content: center; padding: 40px 24px 60px; flex-wrap: wrap; }

  .controls { width: 300px; position: sticky; top: 90px; }
  .controls .grp { margin-bottom: 22px; }
  .controls h3 { font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); margin: 0 0 10px; font-weight: 600; }
  .seg { display: flex; gap: 6px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 5px; }
  .seg button { flex: 1; padding: 9px 4px; border: none; background: none; cursor: pointer; border-radius: 8px; font-family: var(--sans); font-weight: 600; font-size: 13.5px; color: var(--ink-3); display: flex; align-items: center; justify-content: center; gap: 6px; }
  .seg button.on { background: var(--ink); color: var(--bg); }
  .seg.state button.on { color: var(--bg); }
  .seg .sdot { width: 9px; height: 9px; border-radius: 50%; }
  .controls .desc { font-size: 12.5px; color: var(--ink-3); margin-top: 9px; line-height: 1.5; }
  .controls .ublock { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 16px; }
  .controls .ublock p { font-size: 12.5px; color: var(--ink-2); margin: 0 0 12px; line-height: 1.5; }

  .phone-label { text-align: center; font-family: var(--mono); font-size: 12px; color: var(--ink-3); letter-spacing: 0.08em; margin-top: 14px; }

  .ussd-btn { font-family: var(--sans); font-size: 12.5px; font-weight: 600; background: #2f3a22; color: #cfe3b4; border: 1px solid #46552f; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
  .ussd-btn.ghost { background: transparent; color: #8a9676; }

  .spinner { border: 4px solid var(--bg-2); border-top-color: var(--sun); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .legend { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .legend .row { display: flex; align-items: center; gap: 9px; font-size: 12.5px; color: var(--ink-2); }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-in">
    <a class="back" href="../Kanea — Framework.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M19 12H5M11 18l-6-6 6-6"/></svg> Framework</a>
    <div class="title">Kane<b>a</b> · Customer App</div>
    <div style="width:110px"></div>
  </div>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../frames/android-frame.jsx"></script>
<script type="text/babel" src="customer-screens.jsx"></script>
<script type="text/babel" src="customer.jsx"></script>
<script type="text/babel">
const { useState } = React;

function Page() {
  const [variant, setVariant] = useState('A');
  const [stateKey, setStateKey] = useState('healthy');
  const [online, setOnline] = useState(true);
  const [ussd, setUssd] = useState(false);

  const variants = [['A', 'Balance'], ['B', 'Status'], ['C', 'Glance']];
  const states = [
    ['healthy', 'Healthy', 'var(--on)'],
    ['low', 'Low', 'var(--low)'],
    ['off', 'Off', 'var(--off)'],
  ];

  return (
    <div className="stage">
      <div className="controls">
        <div className="grp">
          <h3>Home layout · 3 variants</h3>
          <div className="seg">
            {variants.map(([id, l]) => (
              <button key={id} className={variant === id ? 'on' : ''} onClick={() => setVariant(id)}>{l}</button>
            ))}
          </div>
          <div className="desc">
            {variant === 'A' && 'Balance-first — the big number and one-tap top-up lead. Familiar, fast.'}
            {variant === 'B' && 'Status-first — a traffic-light disc you can read across the room. Lowest-literacy.'}
            {variant === 'C' && 'Glance — modular cards for power, balance, battery & savings at once.'}
          </div>
        </div>

        <div className="grp">
          <h3>Service state</h3>
          <div className="seg state">
            {states.map(([id, l, c]) => (
              <button key={id} className={stateKey === id ? 'on' : ''} onClick={() => setStateKey(id)}>
                <span className="sdot" style={{ background: c }}></span>{l}
              </button>
            ))}
          </div>
          <div className="desc">Drives the whole screen: green = on, amber = low-balance warning before cutoff, red = disconnected after grace. Top up in-app to reconnect.</div>
        </div>

        <div className="grp">
          <h3>Connectivity</h3>
          <div className="seg">
            <button className={online ? 'on' : ''} onClick={() => setOnline(true)}>Online</button>
            <button className={!online ? 'on' : ''} onClick={() => setOnline(false)}>Offline</button>
          </div>
          <div className="desc">Offline shows last-known state with a timestamp — never a blank screen.</div>
        </div>

        <div className="grp">
          <h3>Feature-phone parity</h3>
          <div className="ublock">
            <p>Every critical action also works over USSD on a basic phone with no data.</p>
            <button className="btn btn-ghost" style={{ width: '100%' }} onClick={() => setUssd(true)}>Open USSD · *123#</button>
          </div>
        </div>
      </div>

      <div>
        <AndroidDevice width={380} height={788}>
          <CustomerApp variant={variant} stateKey={stateKey} online={online} onRefreshToggle={() => setOnline(o => !o)} />
        </AndroidDevice>
        <div className="phone-label">MID-RANGE ANDROID · 380×788</div>
      </div>

      <UssdMock open={ussd} onClose={() => setUssd(false)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
