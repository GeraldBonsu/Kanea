<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanea — Ops Dashboard</title>
<link rel="stylesheet" href="../styles/kanea.css">
<style>
  html, body { height: 100%; }
  body { background: #1a1714; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .backlink { position: fixed; top: 16px; left: 18px; z-index: 100; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: #cabfb0; font-weight: 600; font-size: 13.5px; padding: 8px 12px; border-radius: 10px; background: rgba(255,255,255,0.06); }
  .backlink:hover { background: rgba(255,255,255,0.12); color: #fff; }
  #fit { transform-origin: center center; }

  /* ---------- ops layout ---------- */
  .ops-root { display: flex; height: 100%; position: relative; background: var(--bg); font-family: var(--sans); color: var(--ink); }

  .ops-side { width: 232px; flex: none; background: var(--surface); border-right: 1px solid var(--line); display: flex; flex-direction: column; padding: 18px 14px; }
  .ops-brand { display: flex; align-items: center; gap: 10px; padding: 6px 8px 20px; }
  .ops-name { font-family: var(--display); font-weight: 700; font-size: 18px; }
  .ops-name b { color: var(--sun-deep); }
  .ops-name span { color: var(--ink-3); font-weight: 500; }
  .ops-side nav { display: flex; flex-direction: column; gap: 3px; }
  .ops-navitem { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 11px; border: none; background: none; cursor: pointer; font-family: var(--sans); font-size: 14.5px; font-weight: 600; color: var(--ink-2); }
  .ops-navitem:hover { background: var(--bg-2); }
  .ops-navitem.on { background: var(--ink); color: var(--bg); }
  .nav-badge { font-size: 11.5px; font-weight: 700; background: var(--bg-2); color: var(--ink-2); border-radius: 999px; padding: 2px 8px; font-family: var(--display); }
  .ops-navitem.on .nav-badge { background: rgba(255,255,255,0.18); color: var(--bg); }
  .nav-badge.hot { background: var(--off-bg); color: var(--off-ink); }
  .ops-navitem.on .nav-badge.hot { background: var(--off); color: #fff; }
  .ops-user { margin-top: auto; display: flex; align-items: center; gap: 11px; padding: 12px 10px 4px; border-top: 1px solid var(--line); }

  .avatar { width: 34px; height: 34px; border-radius: 10px; background: var(--sun-soft); color: var(--sun-deep); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12.5px; font-family: var(--display); flex: none; }

  .ops-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .ops-topbar { height: 62px; flex: none; border-bottom: 1px solid var(--line); background: var(--surface); display: flex; align-items: center; justify-content: space-between; padding: 0 26px; }
  .ops-search { display: flex; align-items: center; gap: 9px; background: var(--bg-2); border-radius: 11px; padding: 9px 14px; width: 340px; color: var(--ink-3); }
  .ops-search input { border: none; background: none; outline: none; font-family: var(--sans); font-size: 14px; color: var(--ink); flex: 1; }
  .ops-summary { display: flex; align-items: center; gap: 16px; font-size: 13.5px; color: var(--ink-2); }
  .ops-summary b { font-weight: 700; }
  .ops-summary .div { width: 1px; height: 18px; background: var(--line-2); }
  .ops-content { flex: 1; overflow-y: auto; padding: 26px; }

  /* tables */
  .ops-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .ops-table thead th { text-align: left; font-size: 11.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3); padding: 13px 18px; border-bottom: 1px solid var(--line); background: var(--bg-2); }
  .ops-table tbody td { padding: 14px 18px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  .ops-table tbody tr:last-child td { border-bottom: none; }
  .ops-table tbody tr:hover { background: var(--bg-2); }
  .linkcell { background: none; border: none; text-align: left; cursor: pointer; font-family: var(--sans); color: var(--ink); padding: 0; }
  .linkcell:hover { color: var(--sun-deep); }

  .mini-btn { display: inline-flex; align-items: center; gap: 6px; font-family: var(--sans); font-size: 12.5px; font-weight: 600; padding: 7px 11px; border-radius: 9px; border: 1px solid var(--line-2); background: var(--surface); color: var(--ink); cursor: pointer; white-space: nowrap; }
  .mini-btn:hover { background: var(--bg-2); }
  .mini-btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .mini-btn.primary:hover { background: oklch(0.30 0.015 60); }
  .mini-btn.active { background: var(--low-bg); border-color: var(--low); color: var(--low-ink); }

  .assign-select { font-family: var(--sans); font-size: 13.5px; font-weight: 600; padding: 7px 10px; border-radius: 9px; border: 1px solid var(--line-2); background: var(--surface); color: var(--ink); cursor: pointer; }

  .type-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 4px 8px; border-radius: 7px; flex: none; }
  .type-tag.fault { background: var(--off-bg); color: var(--off-ink); }
  .type-tag.maintenance { background: var(--low-bg); color: var(--low-ink); }
  .type-tag.install { background: var(--info-bg); color: var(--info); }

  .filter-seg { display: flex; gap: 4px; background: var(--bg-2); border-radius: 11px; padding: 4px; }
  .filter-seg button { border: none; background: none; cursor: pointer; padding: 7px 14px; border-radius: 8px; font-family: var(--sans); font-weight: 600; font-size: 13px; color: var(--ink-3); }
  .filter-seg button.on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }

  /* exceptions */
  .exc-row { display: flex; align-items: center; gap: 16px; padding: 16px 18px; cursor: pointer; transition: transform .1s ease, box-shadow .1s ease; }
  .exc-row:hover { box-shadow: var(--shadow); transform: translateX(2px); }
  .exc-ic { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex: none; }
  .exc-ic.off { background: var(--off-bg); color: var(--off); }
  .exc-ic.low { background: var(--low-bg); color: var(--low-ink); }
  .exc-ic.neutral { background: var(--bg-2); color: var(--ink-2); }
  .exc-ic.on { background: var(--on-bg); color: var(--on); }

  /* map */
  .map-placeholder { width: 100%; height: 100%; position: relative; background: repeating-linear-gradient(135deg, var(--bg-2), var(--bg-2) 11px, var(--bg) 11px, var(--bg) 22px); overflow: hidden; }
  .map-grid { position: absolute; inset: 0; background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px); background-size: 56px 56px; opacity: 0.5; }
  .site-dot { position: absolute; width: 12px; height: 12px; border-radius: 50%; transform: translate(-50%, -50%); }
  .map-tag { position: absolute; bottom: 16px; left: 16px; font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.08em; color: var(--ink-3); background: var(--surface); padding: 7px 12px; border-radius: 8px; box-shadow: var(--shadow-sm); }

  .s360-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 18px; }

  /* drawer */
  .drawer-scrim { position: absolute; inset: 0; background: rgba(30,22,12,0.4); z-index: 60; display: flex; justify-content: flex-end; backdrop-filter: blur(2px); }
  .drawer { width: 760px; max-width: 92%; height: 100%; background: var(--bg); overflow-y: auto; box-shadow: -20px 0 60px rgba(0,0,0,0.2); animation: drawerIn .28s cubic-bezier(.2,.8,.2,1); }
  @keyframes drawerIn { from { transform: translateX(40px); opacity: .4; } to { transform: translateX(0); opacity: 1; } }
  .drawer-head { position: sticky; top: 0; background: color-mix(in oklch, var(--bg) 88%, transparent); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; z-index: 5; }

  .toast { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--bg); padding: 12px 18px; border-radius: 12px; font-size: 13.5px; font-weight: 600; display: flex; align-items: center; gap: 9px; box-shadow: var(--shadow-lg); z-index: 80; animation: drawerIn .2s ease; }
</style>
</head>
<body>
<a class="backlink" href="../Kanea — Framework.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M19 12H5M11 18l-6-6 6-6"/></svg> Framework</a>

<div id="fit"><div id="root"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../frames/browser-window.jsx"></script>
<script type="text/babel" src="ops-views.jsx"></script>
<script type="text/babel" src="ops.jsx"></script>
<script type="text/babel">
const W = 1280, H = 800;
function OpsPage() {
  return (
    <ChromeWindow width={W} height={H} url="ops.kanea.gh/exceptions" tabs={[{ title: 'Kanea Ops' }]}>
      <OpsShell />
    </ChromeWindow>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<OpsPage />);

function fit() {
  const pad = 36;
  const s = Math.min((window.innerWidth - pad) / W, (window.innerHeight - pad) / H, 1);
  document.getElementById('fit').style.transform = `scale(${s})`;
}
window.addEventListener('resize', fit);
setTimeout(fit, 50); fit();
</script>
</body>
</html>
